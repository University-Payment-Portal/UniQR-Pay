<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University QR Payment</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; text-align: center; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input { padding: 10px; margin: 10px; width: 80%; display: block; margin: 10px auto; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 12px 20px; background-color: #004a99; color: white; border: none; cursor: pointer; width: 85%; border-radius: 5px; font-weight: bold; }
        #qrcode { margin-top: 20px; display: flex; justify-content: center; }
    </style>
</head>
<body>

    <div id="main-content" class="container">
        <h1>University Payment</h1>
        <p>Enter details to generate your QR.</p>
        <input type="text" id="studentID" placeholder="Student ID (e.g. 2024-001)">
        <input type="number" id="amount" placeholder="Amount (PHP)">
        <button onclick="generatePayment()">Generate QR Code</button>
        <div id="qrcode"></div>
    </div>

    <script>
        // CHECK IF SCANNED
        window.onload = function() {
            var urlParams = new URLSearchParams(window.location.search);
            var id = urlParams.get('id');
            var amt = urlParams.get('amt');

            if (id && amt) {
                // Change the whole page to the Receipt/Transaction view
                document.getElementById('main-content').innerHTML = `
                    <div style="text-align: center; padding: 10px;">
                        <h2 style="color: #004a99;">LPU Payment Portal</h2>
                        <hr>
                        <div style="text-align: left; margin: 20px 0;">
                            <p><strong>Student ID:</strong> <span style="float: right;">` + id + `</span></p>
                            <p><strong>Total Amount:</strong> <span style="float: right; color: #d9534f; font-weight: bold;">₱` + amt + `</span></p>
                        </div>
                        <button onclick="alert('Mock GCash Opening...')" style="background: #007bff; margin-bottom: 10px;">Pay with GCash</button>
                        <button onclick="alert('Mock Maya Opening...')" style="background: #28a745; margin-bottom: 10px;">Pay with Maya</button>
                        <button onclick="window.location.href='index.html'" style="background: #6c757d;">Cancel</button>
                    </div>
                `;
            }
        };

        function generatePayment() {
            var id = document.getElementById("studentID").value;
            var amt = document.getElementById("amount").value;
            var qrContainer = document.getElementById("qrcode");

            qrContainer.innerHTML = "";

            if (id === "" || amt === "") {
                alert("Please enter both Student ID and Amount!");
                return;
            }

            // YOUR OFFICIAL LINK
            var paymentData = "https://university-payment-portal.github.io/UniQR-Pay/?id=" + id + "&amt=" + amt;
            
            new QRCode(qrContainer, {
                text: paymentData,
                width: 200,
                height: 200
            });
        }
    </script>
</body>
</html>
